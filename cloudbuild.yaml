steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/mapa/mapa-api', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/mapa/mapa-api']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mapa-api'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/mapa/mapa-api'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=GEMINI_API_KEY=AIzaSyAiLrGOHg4cHfs5KD3a6uKL6CzDfRJsixw'
images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/mapa/mapa-api'
options:
  logging: CLOUD_LOGGING_ONLY
