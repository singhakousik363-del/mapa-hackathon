<svg width="100%" viewBox="0 0 680 530" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>MAPA system architecture</title>
  <desc>User input flows through React frontend to MAPAOrchestrator on Cloud Run, which fans out in parallel to Task, Calendar, and Notes MCP agents, all writing to Firebase Firestore.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
  <rect x="240" y="20" width="200" height="52" rx="8" fill="#f1f0ec" stroke="#aaa" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="43" text-anchor="middle" fill="#333">User</text>
  <text font-family="sans-serif" font-size="11" x="340" y="61" text-anchor="middle" fill="#777">Voice + text, 8 Indian languages</text>
  <line x1="340" y1="72" x2="340" y2="102" stroke="#aaa" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="190" y="102" width="300" height="52" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="125" text-anchor="middle" fill="#1e3a8a">React frontend</text>
  <text font-family="sans-serif" font-size="11" x="340" y="143" text-anchor="middle" fill="#1e40af">Firebase Hosting, chat UI, agent badges</text>
  <line x1="340" y1="154" x2="340" y2="184" stroke="#aaa" stroke-width="1.2" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="11" x="352" y="172" fill="#888">HTTPS /chat</text>
  <rect x="155" y="184" width="370" height="52" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="207" text-anchor="middle" fill="#3b0764">MAPAOrchestrator</text>
  <text font-family="sans-serif" font-size="11" x="340" y="225" text-anchor="middle" fill="#5b21b6">Gemini 2.5 Flash, Cloud Run asia-south1</text>
  <path d="M255 236 L130 284" fill="none" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M340 236 L340 284" fill="none" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M425 236 L550 284" fill="none" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>
  <text font-family="sans-serif" font-size="10" x="340" y="264" text-anchor="middle" fill="#999">parallel execution via asyncio.gather()</text>
  <rect x="40" y="284" width="178" height="52" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="129" y="307" text-anchor="middle" fill="#064e3b">Task agent</text>
  <text font-family="sans-serif" font-size="11" x="129" y="325" text-anchor="middle" fill="#065f46">TaskMCPTool, CRUD tasks</text>
  <rect x="251" y="284" width="178" height="52" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="307" text-anchor="middle" fill="#451a03">Calendar agent</text>
  <text font-family="sans-serif" font-size="11" x="340" y="325" text-anchor="middle" fill="#78350f">CalendarMCPTool, CRUD events</text>
  <rect x="462" y="284" width="178" height="52" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="551" y="307" text-anchor="middle" fill="#450a0a">Notes agent</text>
  <text font-family="sans-serif" font-size="11" x="551" y="325" text-anchor="middle" fill="#7f1d1d">NotesMCPTool, CRUD notes</text>
  <path d="M129 336 L260 390" fill="none" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M340 336 L340 390" fill="none" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M551 336 L420 390" fill="none" stroke="#bbb" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="190" y="390" width="300" height="52" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="0.8"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="340" y="413" text-anchor="middle" fill="#14532d">Firebase Firestore</text>
  <text font-family="sans-serif" font-size="11" x="340" y="431" text-anchor="middle" fill="#166534">tasks, events, notes collections</text>
  <text font-family="sans-serif" font-size="10" x="340" y="500" text-anchor="middle" fill="#ccc">Google Cloud Gen AI Academy APAC 2026</text>
</svg>